name: Release

on:
  push:
    tags:
      - "v*"

# checkout / setup-node are pinned to v5 below (Node-24 native). This flag is
# a residual safety net: it forces any slower-to-update JS action (rust-cache,
# tauri-action) onto Node 24 until it ships a Node-24 release of its own.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write  # required to create the GitHub Release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          # x86_64 / Intel build is omitted while the macos-13 free-tier
          # runner queue is unreliable. See #2 for the policy decision.
          # - runner: macos-13
          #   target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        # Preinstalled rustup directly — see the note in ci.yml on the
        # flaky third-party toolchain reinstall.
        run: |
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # The whisper speech model is no longer bundled in the `.app` — it
      # auto-downloads on first launch into the app-data models dir. This
      # keeps the `.dmg` / updater payload small so notarization is fast.

      # The Apple Intelligence sidecar (`dicto-apple-polish`) is checked
      # in at each release tag because GitHub Actions macOS runners
      # don't ship the macOS 26 SDK yet (FoundationModels is
      # macOS-26-only). Sanity-check it's present before handing off to
      # tauri build, which would otherwise fail with a confusing
      # "externalBin not found" error.
      - name: Verify Apple Intelligence sidecar present
        run: |
          set -e
          BIN="src-tauri/binaries/dicto-apple-polish-${{ matrix.target }}"
          if [[ ! -x "$BIN" ]]; then
            echo "ERROR: $BIN missing or not executable."
            echo "Maintainer: run scripts/build-apple-polish.sh on macOS 26 and commit before tagging."
            exit 1
          fi
          file "$BIN"

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater (minisign) signing — distinct from Apple code signing below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing — tauri-action imports the cert
          # and signs the .app/.dmg with the hardened runtime (entitlements
          # from src-tauri/entitlements.plist). NOTARIZATION is deliberately
          # NOT done here: withholding APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # makes tauri-action skip it. tauri's built-in notarize does a
          # single un-retried status poll that dies if a transient runner
          # network blip (`-1009`) lands during Apple's (often long) wait —
          # which failed three release builds. The "Notarize & staple" step
          # below does it resiliently: submit once, retry the poll.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dicto ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details. Signed and notarized — drag Dicto.app to Applications and open it."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # tauri-action (above) builds + signs but does NOT notarize. Do it
      # here, resiliently: submit the .dmg to Apple's notary service ONCE,
      # then poll the submission status in a loop that simply retries on a
      # transient network blip (no re-submit) — the failure mode that broke
      # tauri's built-in single-shot --wait three times. Then staple the
      # notarization ticket onto the .dmg and re-upload it over the draft
      # release. (The .app.tar.gz updater payload isn't re-stapled: its app
      # shares the cdhash notarized via the .dmg submission, so Gatekeeper's
      # online check passes it.)
      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DMG=$(ls src-tauri/target/"${TARGET}"/release/bundle/dmg/*.dmg)
          echo "Notarizing ${DMG}"
          CREDS=(--apple-id "${APPLE_ID}" --password "${APPLE_PASSWORD}" --team-id "${APPLE_TEAM_ID}")

          # Submit once. Retry only the upload itself on a network blip.
          SUBMIT_ID=""
          for attempt in 1 2 3 4 5; do
            OUT=$(xcrun notarytool submit "${DMG}" "${CREDS[@]}" --no-wait --output-format json 2>&1) || OUT=""
            SUBMIT_ID=$(echo "${OUT}" | jq -r '.id // empty' 2>/dev/null || true)
            if [[ -n "${SUBMIT_ID}" ]]; then break; fi
            echo "submit attempt ${attempt} failed; retrying in 30s…"
            sleep 30
          done
          if [[ -z "${SUBMIT_ID}" ]]; then
            echo "ERROR: notarization submit failed after retries" >&2
            exit 1
          fi
          echo "Submission ID: ${SUBMIT_ID}"

          # Poll the status. A network blip yields an empty status and the
          # loop simply retries — no re-submit. Apple's notary has been
          # severely slow (90+ min and still "In Progress" on a bad day),
          # so allow a very generous window — up to ~4 h. The GitHub job
          # cap is 6 h, leaving headroom for the compile.
          STATUS=""
          for i in $(seq 1 480); do
            STATUS=$(xcrun notarytool info "${SUBMIT_ID}" "${CREDS[@]}" --output-format json 2>/dev/null | jq -r '.status' 2>/dev/null || true)
            echo "[poll ${i}] status: ${STATUS:-<network blip — retrying>}"
            case "${STATUS}" in
              Accepted) break ;;
              Invalid|Rejected)
                echo "ERROR: notarization ${STATUS}" >&2
                xcrun notarytool log "${SUBMIT_ID}" "${CREDS[@]}" || true
                exit 1 ;;
              *) sleep 30 ;;
            esac
          done
          if [[ "${STATUS}" != "Accepted" ]]; then
            echo "ERROR: notarization didn't finish in the allotted window (last: ${STATUS})" >&2
            exit 1
          fi

          xcrun stapler staple "${DMG}"
          xcrun stapler validate "${DMG}"
          gh release upload "${VERSION}" "${DMG}" --clobber --repo "${REPO}"
          echo "✓ notarized + stapled + re-uploaded ${DMG}"

      # tauri-action uploads the .dmg and the .app.tar.gz but NOT the .sig
      # file or a latest.json manifest — so the in-app auto-updater can't
      # find or verify update payloads. This step plugs that gap.
      - name: Publish updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          VERSION_NUM="${VERSION#v}"
          ARCH="${TARGET%-apple-darwin}"                     # e.g. "aarch64"
          PLATFORM_KEY="darwin-${ARCH}"                       # e.g. "darwin-aarch64"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle/macos"
          SIG_SRC="${BUNDLE_DIR}/Dicto.app.tar.gz.sig"

          if [[ ! -f "${SIG_SRC}" ]]; then
            echo "ERROR: signature file missing at ${SIG_SRC}" >&2
            echo "Is TAURI_SIGNING_PRIVATE_KEY set as a repo secret?" >&2
            exit 1
          fi

          # Rename .sig so the URL the updater plugin computes
          # (.../Dicto_${ARCH}.app.tar.gz.sig) actually resolves on the release.
          SIG_NAME="Dicto_${ARCH}.app.tar.gz.sig"
          cp "${SIG_SRC}" "${SIG_NAME}"
          SIGNATURE="$(cat "${SIG_NAME}")"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/Dicto_${ARCH}.app.tar.gz"
          NOTES="See https://github.com/${{ github.repository }}/releases/tag/${VERSION}"

          # Use jq instead of heredoc interpolation so any odd characters
          # in $SIGNATURE (newlines, embedded quotes, etc.) are escaped
          # into valid JSON — heredoc-with-interpolation would silently
          # produce malformed `latest.json` and break the auto-updater.
          jq -n \
            --arg version "${VERSION_NUM}" \
            --arg notes "${NOTES}" \
            --arg pub_date "${PUB_DATE}" \
            --arg platform_key "${PLATFORM_KEY}" \
            --arg signature "${SIGNATURE}" \
            --arg url "${URL}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                ($platform_key): { signature: $signature, url: $url }
              }
            }' > latest.json

          # Confirm jq emitted valid JSON before we ship it.
          jq -e . latest.json > /dev/null

          echo "Generated latest.json:"
          cat latest.json
          echo

          gh release upload "${VERSION}" \
            "${SIG_NAME}" \
            "latest.json" \
            --clobber \
            --repo "${{ github.repository }}"
